name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: borkdude/setup-babashka@v2
        with:
          babashka-version: 1.12.218
      - name: Run all tests
        run: make test
      - name: Verify examples compile
        run: |
          for f in examples/*.stratus; do
            bb -m stratus.core compile "$f" -o /dev/null
            echo "✓ $(basename $f)"
          done
      - name: Validate JSON files
        run: |
          python3 -m json.tool .vscode/package.json > /dev/null
          python3 -m json.tool .vscode/syntaxes/stratus.tmLanguage.json > /dev/null
          echo "✓ JSON files valid"
